<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>WebView 登录</title>
  <style>
    :root {
      --md-sys-color-primary: #0B6E75;
      --md-sys-color-on-primary: #FFFFFF;
      --md-sys-color-surface: #FAFDFD;
      --md-sys-color-on-surface: #191C1C;
      --md-sys-color-surface-variant: #DBE4E5;
      --md-sys-color-on-surface-variant: #3F4849;
      --md-sys-color-outline: #6F797A;
      --md-sys-color-error: #BA1A1A;
      --md-sys-color-background: #FAFDFD;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --md-sys-color-primary: #4ED8E4;
        --md-sys-color-on-primary: #00363A;
        --md-sys-color-surface: #191C1C;
        --md-sys-color-on-surface: #E0E3E3;
        --md-sys-color-surface-variant: #3F4849;
        --md-sys-color-on-surface-variant: #BFC8C9;
        --md-sys-color-outline: #899394;
        --md-sys-color-error: #FFB4AB;
        --md-sys-color-background: #191C1C;
      }
    }

    body {
      font-family: 'Roboto', 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      padding: 16px;
      padding-top: 24px;
      background-color: var(--md-sys-color-background);
      color: var(--md-sys-color-on-surface);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card {
      background-color: var(--md-sys-color-surface-variant);
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin: 0 0 8px 0;
    }

    p {
      font-size: 14px;
      line-height: 1.5;
      margin: 0 0 24px 0;
      color: var(--md-sys-color-on-surface-variant);
    }

    /* MD3 Filled Text Field Simulation */
    .field-container {
      position: relative;
      margin-bottom: 16px;
      background-color: var(--md-sys-color-surface);
      border-radius: 4px 4px 0 0;
      border-bottom: 1px solid var(--md-sys-color-outline);
    }

    .field-container:focus-within {
      border-bottom: 2px solid var(--md-sys-color-primary);
    }

    .field-container label {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 16px;
      color: var(--md-sys-color-on-surface-variant);
      pointer-events: none;
      transition: 0.15s ease all;
      transform-origin: left top;
    }

    .field-container input {
      width: 100%;
      box-sizing: border-box;
      padding: 24px 16px 8px 16px;
      font-size: 16px;
      border: none;
      background: transparent;
      color: var(--md-sys-color-on-surface);
      outline: none;
    }

    /* Auto-collapse label when focused or not empty (requires placeholder=" ") */
    .field-container input:focus+label,
    .field-container input:not(:placeholder-shown)+label {
      transform: translateY(-8px) scale(0.75);
      color: var(--md-sys-color-primary);
    }

    .field-container input:not(:focus):not(:placeholder-shown)+label {
      color: var(--md-sys-color-on-surface-variant);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      background-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      border: none;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    button:active {
      opacity: 0.8;
    }

    button:disabled {
      background-color: rgba(0, 0, 0, 0.12);
      color: rgba(0, 0, 0, 0.38);
      cursor: not-allowed;
    }

    @media (prefers-color-scheme: dark) {
      button:disabled {
        background-color: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.38);
      }
    }

    #status {
      margin-top: 16px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      color: var(--md-sys-color-primary);
    }
  </style>
  <script>
    try {
      if (window.AndroidAuthBridge && window.AndroidAuthBridge.getColors) {
        const colors = JSON.parse(window.AndroidAuthBridge.getColors());
        for (const key in colors) {
          document.documentElement.style.setProperty(key, colors[key]);
        }
      }
    } catch(e) { }
  </script>
</head>

<body>
  <div class="card">
    <h1>😾WebView 登录😾</h1>
    <p>输入账号密码后在 WebView 中通过 Authing 获取主 token，再交回原生层继续完成食堂登录。</p>

    <div class="field-container">
      <input id="username" type="text" autocomplete="username" placeholder=" " />
      <label for="username">账号</label>
    </div>

    <div class="field-container">
      <input id="password" type="password" autocomplete="current-password" placeholder=" " />
      <label for="password">密码</label>
    </div>

    <button id="submit" type="button">登录</button>
    <div id="status"></div>
  </div>

  <script src="authing_login.js"></script>
</body>

</html>
